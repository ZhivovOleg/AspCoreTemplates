name: .NET

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      comment:
        description: "Comment"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      PACKAGE_OUTPUT: artifacts/packages

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: |
          PACKAGE_VERSION="$(date '+%Y.%m%d.%H%M')"
          dotnet pack SALT.Core.Templates.csproj \
            -c Release \
            -p:PackageVersion="$PACKAGE_VERSION" \
            --output "$PACKAGE_OUTPUT"

      - name: Push to nuget.org
        run: dotnet nuget push "$PACKAGE_OUTPUT/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${{ secrets.NUGET_SECRET }}" --skip-duplicate
